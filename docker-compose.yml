services:
  app:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.app
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LLM_BASE_URL=http://host.docker.internal:11434/v1
    volumes:
      - models_cache:/models
      - book_html:/app/_book:ro
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  quarto-builder:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.quarto
    profiles: ["build"]
    volumes:
      - ./book:/book:ro
      - ./widget:/widget:ro
      - book_html:/output

  indexer:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.indexer
    profiles: ["build"]
    depends_on:
      qdrant:
        condition: service_healthy
    env_file: .env
    environment:
      - BOOK_SOURCE_DIR=/book
      - BOOK_COMMIT_SHA=${BOOK_COMMIT_SHA:-unknown}
      - WHISPER_CACHE_DIR=/models/whisper
    volumes:
      - ./book:/book:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - models_cache:/models

volumes:
  models_cache:
  qdrant_data:
  book_html:
