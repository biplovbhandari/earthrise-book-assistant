services:
  app:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.app
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    env_file: .env
    volumes:
      - models_cache:/models
      - book_html:/app/book_html:ro
    environment:
      - BOOK_HTML_DIR=/app/book_html
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  quarto-builder:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.quarto
    profiles: ["build"]
    volumes:
      - ./book:/book:ro
      - ./widget:/widget:ro
      - book_html:/output

volumes:
  models_cache:
  qdrant_data:
  book_html:
